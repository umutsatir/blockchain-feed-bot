name: Daily Blockchain News

on:
  schedule:
    - cron: "0 5 * * *" # runs daily at 05:00 UTC (08:00 UTC+3)
  workflow_dispatch: # allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: Check if scheduled to run today
        id: check
        run: |
          RUN_EVERY="${{ vars.RUN_EVERY_DAYS || '1' }}"
          DAY=$(( $(date +%s) / 86400 ))
          if [ $(( DAY % RUN_EVERY )) -eq 0 ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Running today (every ${RUN_EVERY} day(s))"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Skipping today (runs every ${RUN_EVERY} days, next run in $(( RUN_EVERY - (DAY % RUN_EVERY) )) day(s))"
          fi

      - name: Checkout repository
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        if: steps.check.outputs.should_run == 'true'
        uses: actions/setup-node@v4.3.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        if: steps.check.outputs.should_run == 'true'
        run: npm install

      - name: Run news bot
        if: steps.check.outputs.should_run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MODEL: ${{ vars.MODEL || 'claude-haiku-4-5-20251001' }}
        run: npx ts-node src/index.ts
